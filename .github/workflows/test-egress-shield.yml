name: Egress Shield Test

on:
  workflow_dispatch:

jobs:
  test-egress-shield:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Use your action (adjust path if needed)
      - name: Enable Egress Shield
        uses: ./.github/actions/action-egress-shield
        with:
          allowed_domains: "github.com api.github.com"
          block: "true"

      - name: Test allowed request
        run: |
          echo "Testing allowed domain..."
          curl -I https://github.com

      - name: Test blocked request
        run: |
          echo "Testing blocked domain..."
          curl -I https://example.com || true

      - name: Test raw socket bypass attempt
        run: |
          echo "Testing raw socket..."
          node -e "require('net').connect(80, '1.1.1.1')"
