name: "Egress Shield"
description: "Logs and restricts outbound network access on GitHub-hosted runners"

inputs:
  allowed_domains:
    description: "Space-separated list of allowed domains"
    required: false
  allowed_ips:
    description: "Space-separated list of allowed IPs"
    required: false
  block:
    description: "Block all traffic not in allowlist"
    default: "false"

runs:
  using: "node22"
  main: "dist/index.js"
  post: "dist/post.js"
